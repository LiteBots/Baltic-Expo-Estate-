<body class="antialiased">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TICKER_WORDS = ["INWESTYCJE", "NETWORKING", "ROZWÓJ", "BIZNES", "NIERUCHOMOŚCI", "KREDYTY", "BUDOWNICTWO", "DESIGN"];

        const EMAILJS_SERVICE_ID = 'service_lvd7cze';
        const EMAILJS_TEMPLATE_ID = 'template_2lqka67';
        const EMAILJS_PUBLIC_KEY = 'ELubHWJeM4leHqOXv';

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Ticker = ({ direction = 'left', className = "" }) => (
            <div className={`flex overflow-hidden whitespace-nowrap py-4 md:py-5 border-y border-zinc-200 ${className}`}>
                <div className={`flex ${direction === 'left' ? 'animate-marquee' : 'animate-marquee-fast'} items-center`}>
                    {[...TICKER_WORDS, ...TICKER_WORDS, ...TICKER_WORDS, ...TICKER_WORDS].map((word, i) => (
                        <div key={i} className="flex items-center">
                            <span className="text-3xl md:text-6xl font-grotesk font-black uppercase mx-4 md:mx-8">{word}</span>
                            <span className="text-lg md:text-xl opacity-30">✦</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        // Komponent sekcji "Miejsce Targów", aby można go było użyć dwukrotnie z odpowiednim stylowaniem
        const LocationSection = ({ isMobile }) => {
            const visibilityClass = isMobile ? 'block lg:hidden py-16' : 'hidden lg:block py-24 md:py-40';
            const borderClass = isMobile ? 'border-y border-zinc-800 my-8' : 'border-b border-zinc-800';
            const sectionId = isMobile ? 'informacje-mobile' : 'informacje';

            return (
                <section id={sectionId} className={`bg-black text-white relative overflow-hidden ${visibilityClass} ${borderClass}`}>
                    <div className="absolute inset-0 bg-architect-grid opacity-10 filter invert"></div>
                    <div className="hidden md:block absolute -right-20 -top-20 text-[20rem] lg:text-[30rem] font-grotesk font-black text-outline-white opacity-5 select-none animate-pulse-slow">BEE</div>

                    <div className="max-w-[1800px] mx-auto px-4 md:px-12 relative z-10">
                        <div className="grid lg:grid-cols-2 gap-12 md:gap-20 items-center">
                            <div className="reveal reveal-left">
                                <h2 className="text-5xl md:text-7xl lg:text-8xl font-grotesk font-black uppercase leading-[0.9] mb-8 md:mb-12">
                                    Miejsce <br/>Targów.
                                </h2>
                                <div className="w-16 md:w-24 h-2 bg-white mb-8 md:mb-12 transform origin-left transition-transform hover:scale-x-150 duration-500"></div>
                                <p className="text-lg md:text-2xl text-zinc-400 font-light max-w-xl">
                                    Hala Gryfia w Słupsku to najnowocześniejszy obiekt wystawienniczy w regionie, gwarantujący doskonałą infrastrukturę.
                                </p>
                            </div>

                            <div className="space-y-8 md:space-y-12 reveal reveal-right">
                                <div className="border-l-2 border-white pl-6 md:pl-8 py-2 md:py-4">
                                    <p className="text-xs md:text-sm font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] text-zinc-500 mb-2 md:mb-4">Data Wydarzenia</p>
                                    <p className="text-3xl sm:text-4xl md:text-6xl font-black font-grotesk text-white">24 Maja 2026</p>
                                    <p className="text-lg md:text-xl text-zinc-400 mt-2 font-light">Niedziela, 11:00 - 18:00</p>
                                </div>
                                <div className="block border-l-2 border-zinc-800 pl-6 md:pl-8 py-2 md:py-4 group hover:border-white transition-colors duration-500 cursor-pointer">
                                    <p className="text-xs md:text-sm font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] text-zinc-500 mb-2 md:mb-4">Lokalizacja</p>
                                    <p className="text-3xl sm:text-4xl md:text-6xl font-black font-grotesk lg:group-hover:translate-x-4 transition-transform duration-500">Hala Gryfia</p>
                                    <p className="text-lg md:text-xl text-zinc-400 mt-2 font-light flex items-center gap-2 md:gap-3">
                                        ul. Szczecińska 99, Słupsk <Icon name="external-link" size={18} className="hidden lg:block opacity-0 -translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300" />
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [showDevInput, setShowDevInput] = useState(false);
            const [unlockCode, setUnlockCode] = useState('');

            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            const [formData, setFormData] = useState({ nip: '', companyName: '', name: '', phone: '', email: '' });
            const [formStatus, setFormStatus] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isFetchingNip, setIsFetchingNip] = useState(false);
            
            const heroTextRef = useRef(null);

            const handleUnlockCodeChange = (e) => {
                const val = e.target.value;
                setUnlockCode(val);
                if (val === '0033') {
                    setIsLocked(false);
                    setShowDevInput(false);
                }
            };

            useEffect(() => {
                if (isLocked || mobileMenuOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
            }, [isLocked, mobileMenuOpen]);

            useEffect(() => {
                const observerOptions = { root: null, rootMargin: '0px', threshold: 0.15 };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    });
                }, observerOptions);

                if (!isLocked) {
                    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                }

                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                    if (heroTextRef.current) {
                        const scrollY = window.scrollY;
                        heroTextRef.current.style.transform = `translate(-50%, calc(-50% + ${scrollY * 0.4}px))`;
                    }
                };
                
                window.addEventListener('scroll', handleScroll);
                handleScroll(); 
                
                if (window.lucide) window.lucide.createIcons();
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    observer.disconnect();
                };
            }, [isLocked]); 

            const handleNipChange = async (e) => {
                const nipValue = e.target.value.replace(/\D/g, ''); 
                setFormData(prev => ({ ...prev, nip: nipValue }));

                if (nipValue.length === 10) {
                    setIsFetchingNip(true);
                    try {
                        const dzisiaj = new Date().toISOString().split('T')[0];
                        const response = await fetch(`https://wl-api.mf.gov.pl/api/search/nip/${nipValue}?date=${dzisiaj}`);
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.result && data.result.subject && data.result.subject.name) {
                                setFormData(prev => ({ ...prev, companyName: data.result.subject.name }));
                            }
                        }
                    } catch (error) {
                        console.error("Błąd pobierania danych firmy:", error);
                    } finally {
                        setIsFetchingNip(false);
                    }
                }
            };

            const sendEmailJS = async (templateParams) => {
                return fetch('https://api.emailjs.com/api/v1.0/email/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_id: EMAILJS_SERVICE_ID,
                        template_id: EMAILJS_TEMPLATE_ID,
                        user_id: EMAILJS_PUBLIC_KEY,
                        template_params: templateParams
                    })
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const response = await sendEmailJS({
                        name: formData.name,
                        company: formData.companyName + (formData.nip ? ` (NIP: ${formData.nip})` : ''),
                        email: formData.email,
                        phone: formData.phone
                    });
                    if (response.ok) {
                        setFormStatus('Sukces! Komplet dokumentów wystawcy został wysłany na Twój adres e-mail.');
                        setFormData({ nip: '', companyName: '', name: '', phone: '', email: '' });
                    } else { setFormStatus('Wystąpił problem z serwerem poczty. Spróbuj ponownie później.'); }
                } catch (error) { setFormStatus('Wystąpił błąd. Sprawdź połączenie z internetem.'); }
                setIsSubmitting(false);
            };

            const closeMenu = () => setMobileMenuOpen(false);

            return (
                <div className="relative w-full h-full">
                    
                    {/* WIDOK BLOKADY (UNDER CONSTRUCTION) */}
                    {isLocked && (
                        <div className="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-white/40 backdrop-blur-xl">
                            <div className="text-center px-4 animate-fade-in">
                                <h1 className="text-4xl sm:text-5xl md:text-7xl font-grotesk font-black uppercase tracking-tighter text-black">
                                    Strona w budowie
                                </h1>
                                <p className="mt-4 text-sm md:text-base text-zinc-600 font-medium font-mono uppercase tracking-widest">
                                    Bałtyckie Targi Nieruchomości
                                </p>
                            </div>
                            
                            <div className="fixed bottom-4 right-4 flex flex-col items-end gap-2">
                                {showDevInput && (
                                    <input 
                                        autoFocus
                                        type="password" 
                                        maxLength="4"
                                        placeholder="****" 
                                        value={unlockCode}
                                        onChange={handleUnlockCodeChange}
                                        className="w-24 border-2 border-black bg-white px-3 py-2 text-center text-xl font-black tracking-[0.3em] outline-none shadow-[4px_4px_0px_0px_rgba(5,5,5,1)]"
                                    />
                                )}
                                <button 
                                    onClick={() => setShowDevInput(!showDevInput)} 
                                    className="text-[10px] font-mono font-bold tracking-widest text-zinc-400 hover:text-black transition-colors px-2 py-1"
                                >
                                    [ Developer ]
                                </button>
                            </div>
                        </div>
                    )}

                    {/* GŁÓWNA ZAWARTOŚĆ STRONY */}
                    <div className={`min-h-screen relative w-full overflow-hidden transition-all duration-700 ${isLocked ? 'blur-md grayscale-[30%] pointer-events-none select-none h-screen' : ''}`}>
                        
                        {/* NAWIGACJA */}
                        <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'py-3 md:py-4 bg-white/95 backdrop-blur-xl border-b border-black/10 shadow-sm' : 'py-4 md:py-8 bg-transparent'}`}>
                            <div className="w-full px-4 md:px-12 flex justify-between items-center max-w-[1800px] mx-auto relative">
                                
                                <div className="hidden lg:flex gap-12 text-xs font-black uppercase tracking-[0.2em] text-zinc-500 items-center">
                                    <a href="#o-wydarzeniu" className="hover:text-black hover:-translate-y-1 transition-all">O Wydarzeniu</a>
                                    <a href="#dla-kogo" className="hover:text-black hover:-translate-y-1 transition-all">Dla Kogo</a>
                                    <a href="#informacje" className="hover:text-black hover:-translate-y-1 transition-all">Data & Miejsce</a>
                                </div>

                                <div className="lg:hidden flex-1">
                                    <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 -ml-2 text-black z-50 relative">
                                        <Icon name={mobileMenuOpen ? "x" : "menu"} size={28} />
                                    </button>
                                </div>

                                <div className="flex items-center gap-3 md:gap-4 ml-auto z-50 relative">
                                    <span className="font-grotesk font-black text-sm sm:text-lg md:text-2xl tracking-tighter uppercase text-right leading-none">Baltic Expo<br/>Estate</span>
                                    <a href="#" className={`transition-all duration-500 transform hover:scale-105 origin-right flex-shrink-0 ${scrolled ? 'h-8 md:h-12' : 'h-10 md:h-16'}`}>
                                        <img src="https://i.imgur.com/teVTDYr.png" alt="Baltic Expo Estate Logo" className="h-full w-auto object-contain drop-shadow-xl" />
                                    </a>
                                </div>
                                
                            </div>
                        </nav>

                        {/* OVERLAY MENU MOBILNEGO */}
                        <div className={`fixed inset-0 bg-white z-40 transition-transform duration-500 flex flex-col justify-center items-center ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:hidden`}>
                            <div className="flex flex-col gap-8 text-2xl font-black uppercase tracking-widest text-center">
                                <a href="#o-wydarzeniu" onClick={closeMenu} className="hover:text-zinc-500">O Wydarzeniu</a>
                                <a href="#dla-kogo" onClick={closeMenu} className="hover:text-zinc-500">Dla Kogo</a>
                                <a href="#informacje-mobile" onClick={closeMenu} className="hover:text-zinc-500">Data & Miejsce</a>
                            </div>
                        </div>

                        {/* HERO SECTION */}
                        <section className="relative min-h-screen pt-[120px] md:pt-[160px] lg:pt-[200px] pb-12 md:pb-20 flex flex-col justify-center overflow-hidden bg-white">
                            
                            {/* DODANE ZDJĘCIE W TLE HERO ORAZ USUNIĘTA KRATKA */}
                            <div className="absolute inset-0 z-0">
                                <img src="https://i.imgur.com/7vGnosV.jpeg" alt="Tło Hero" className="w-full h-full object-cover opacity-30" />
                            </div>
                            
                            <div ref={heroTextRef} className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full text-center pointer-events-none select-none z-0 transition-transform duration-100 ease-out">
                                <h1 className="text-[30vw] md:text-[25vw] font-black font-grotesk text-zinc-100/80 leading-none mt-10 md:mt-20">2026</h1>
                            </div>

                            <div className="relative z-10 w-full px-4 md:px-12 max-w-[1800px] mx-auto grid lg:grid-cols-12 gap-8 lg:gap-8 items-center reveal reveal-up">
                                
                                {/* LEWA STRONA HERO - TEKST */}
                                <div className="lg:col-span-6 xl:col-span-7 pt-10 lg:pt-0">
                                    <div className="inline-flex items-center gap-3 md:gap-4 mb-6 md:mb-8 bg-black text-white px-4 py-2 md:px-6 md:py-3 border-l-4 border-zinc-400">
                                        <Icon name="calendar" size={20} className="md:w-6 md:h-6" />
                                        <p className="text-sm md:text-lg font-black uppercase tracking-[0.1em] md:tracking-[0.2em]">24 Maja 2026 r. • 11:00 - 18:00</p>
                                    </div>
                                    
                                    <h1 className="text-4xl sm:text-5xl md:text-7xl lg:text-[6rem] xl:text-[6.5rem] font-grotesk font-black tracking-tighter leading-[0.95] md:leading-[0.9] uppercase mb-6 md:mb-8 mix-blend-difference text-black break-words">
                                        Bałtyckie Targi <br />
                                        <span className="text-outline">Nieruchomości</span> <br />
                                        <span className="text-2xl sm:text-3xl md:text-5xl lg:text-[4rem]">EDYCJA I</span>
                                    </h1>

                                    <div className="text-lg sm:text-xl md:text-3xl font-medium border-l-4 border-black pl-4 md:pl-6 py-2 bg-white/70 backdrop-blur-sm inline-block max-w-full">
                                        <p>Hala Gryfia Słupsk 2026 <br className="md:hidden"/>– największe wydarzenie w regionie.</p>
                                    </div>
                                </div>

                                {/* TYLKO MOBILE: MIEJSCE TARGÓW (Z bezpiecznym ujemnym marginesem) */}
                                <div className="col-span-full -mx-4 md:-mx-12 lg:hidden">
                                    <LocationSection isMobile={true} />
                                </div>

                                {/* PRAWA STRONA HERO - FORMULARZ (Wymuszone wyśrodkowanie na mobile) */}
                                <div className="lg:col-span-6 xl:col-span-5 flex flex-col items-center lg:items-end w-full mt-8 lg:mt-0">
