<body class="antialiased">
    <div class="noise-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AUDIENCE = [
            { id: 1, title: "Deweloperzy", icon: "building-2", desc: "Prezentacja nowych inwestycji i osiedli." },
            { id: 2, title: "Agencje", icon: "home", desc: "Rynek wtórny i pierwotny w jednym miejscu." },
            { id: 3, title: "Pośrednicy", icon: "calculator", desc: "Doradztwo finansowe i kredyty hipoteczne." },
            { id: 4, title: "Banki", icon: "landmark", desc: "Bezpośrednie oferty finansowania." },
            { id: 5, title: "Budowlane", icon: "hard-hat", desc: "Generalni wykonawcy i podwykonawcy." },
            { id: 6, title: "Wykończenia", icon: "paint-roller", desc: "Remonty i wykończenia pod klucz." },
            { id: 7, title: "Wnętrza", icon: "sofa", desc: "Meble, oświetlenie i artykuły dekoracyjne." },
            { id: 8, title: "Notariusze", icon: "pen-tool", desc: "Obsługa prawna transakcji." },
            { id: 9, title: "Projektanci", icon: "ruler", desc: "Architekci i projektanci wnętrz." },
            { id: 10, title: "Modułowe", icon: "box", desc: "Nowoczesne technologie budownictwa." }
        ];

        const TICKER_WORDS = ["INWESTYCJE", "NETWORKING", "ROZWÓJ", "BIZNES", "NIERUCHOMOŚCI", "KREDYTY", "BUDOWNICTWO", "DESIGN"];

        const EMAILJS_SERVICE_ID = 'service_lvd7cze';
        const EMAILJS_TEMPLATE_ID = 'template_2lqka67';
        const EMAILJS_PUBLIC_KEY = 'ELubHWJeM4leHqOXv';

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Ticker = ({ direction = 'left', className = "", dark = false }) => (
            <div className={`flex overflow-hidden whitespace-nowrap py-4 md:py-5 border-y ${dark ? 'bg-black border-zinc-800 text-white' : 'bg-white border-zinc-200 text-black'} ${className}`}>
                <div className={`flex ${direction === 'left' ? 'animate-marquee' : 'animate-marquee-fast'} items-center`}>
                    {[...TICKER_WORDS, ...TICKER_WORDS, ...TICKER_WORDS, ...TICKER_WORDS].map((word, i) => (
                        <div key={i} className="flex items-center">
                            <span className="text-3xl md:text-6xl font-grotesk font-black uppercase mx-4 md:mx-8">{word}</span>
                            <span className="text-lg md:text-xl opacity-30">✦</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            // Stany formularza głównego
            const [formData, setFormData] = useState({ nip: '', companyName: '', name: '', phone: '', email: '' });
            const [formStatus, setFormStatus] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isFetchingNip, setIsFetchingNip] = useState(false);

            // Stany formularza górnego
            const [topFormData, setTopFormData] = useState({ name: '', company: '', email: '', phone: '', consent: false });
            const [topFormStatus, setTopFormStatus] = useState(null);
            const [topIsSubmitting, setTopIsSubmitting] = useState(false);
            
            const heroTextRef = useRef(null);
            
            // Referencja do naszej karuzeli (slidera)
            const carouselRef = useRef(null);
            // Stan sprawdzający czy użytkownik aktualnie dotyka/przewija karuzelę
            const [isUserInteracting, setIsUserInteracting] = useState(false);

            useEffect(() => {
                const observerOptions = { root: null, rootMargin: '0px', threshold: 0.15 };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    });
                }, observerOptions);

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                    if (heroTextRef.current) {
                        const scrollY = window.scrollY;
                        heroTextRef.current.style.transform = `translate(-50%, calc(-50% + ${scrollY * 0.4}px))`;
                    }
                };
                
                window.addEventListener('scroll', handleScroll);
                handleScroll(); 
                
                if (window.lucide) window.lucide.createIcons();
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    observer.disconnect();
                };
            }, []);

            useEffect(() => {
                if (mobileMenuOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
            }, [mobileMenuOpen]);

            // === AUTOPLAY KARUZELI NA URZĄDZENIACH MOBILNYCH ===
            useEffect(() => {
                // Jeśli ekran jest duży (komputery, gdzie mamy grid) lub jeśli użytkownik dotyka ekranu, nie rób nic
                if (window.innerWidth >= 1024 || isUserInteracting) return;

                const carousel = carouselRef.current;
                if (!carousel) return;

                const intervalId = setInterval(() => {
                    // Sprawdzamy czy osiągnęliśmy koniec karuzeli
                    const isAtEnd = carousel.scrollLeft + carousel.clientWidth >= carousel.scrollWidth - 10;
                    
                    if (isAtEnd) {
                        // Jeśli tak, wracamy na początek
                        carousel.scrollTo({ left: 0, behavior: 'smooth' });
                    } else {
                        // Jeśli nie, przesuwamy o szerokość jednego elementu (85vw)
                        // Przeliczamy 85vw na pixele
                        const scrollAmount = window.innerWidth * 0.85; 
                        carousel.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                    }
                }, 3000); // Co ile milisekund ma się przesuwać (tutaj co 3 sekundy)

                return () => clearInterval(intervalId); // Czyścimy interval żeby nie zaśmiecać pamięci
            }, [isUserInteracting]);

            // === FUNKCJA POBIERANIA DANYCH Z GUS/MF ===
            const handleNipChange = async (e) => {
                const nipValue = e.target.value.replace(/\D/g, ''); 
                setFormData(prev => ({ ...prev, nip: nipValue }));

                if (nipValue.length === 10) {
                    setIsFetchingNip(true);
                    try {
                        const dzisiaj = new Date().toISOString().split('T')[0];
                        const response = await fetch(`https://wl-api.mf.gov.pl/api/search/nip/${nipValue}?date=${dzisiaj}`);
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.result && data.result.subject && data.result.subject.name) {
                                setFormData(prev => ({ ...prev, companyName: data.result.subject.name }));
                            }
                        }
                    } catch (error) {
                        console.error("Błąd pobierania danych firmy:", error);
                    } finally {
                        setIsFetchingNip(false);
                    }
                }
            };

            const sendEmailJS = async (templateParams) => {
                return fetch('https://api.emailjs.com/api/v1.0/email/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_id: EMAILJS_SERVICE_ID,
                        template_id: EMAILJS_TEMPLATE_ID,
                        user_id: EMAILJS_PUBLIC_KEY,
                        template_params: templateParams
                    })
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const response = await sendEmailJS({
                        name: formData.name,
                        company: formData.companyName + (formData.nip ? ` (NIP: ${formData.nip})` : ''),
                        email: formData.email,
                        phone: formData.phone
                    });
                    if (response.ok) {
                        setFormStatus('Sukces! Komplet dokumentów wystawcy został wysłany na Twój adres e-mail.');
                        setFormData({ nip: '', companyName: '', name: '', phone: '', email: '' });
                    } else { setFormStatus('Wystąpił problem z serwerem poczty. Spróbuj ponownie później.'); }
                } catch (error) { setFormStatus('Wystąpił błąd. Sprawdź połączenie z internetem.'); }
                setIsSubmitting(false);
            };

            const handleTopSubmit = async (e) => {
                e.preventDefault();
                setTopIsSubmitting(true);
                try {
                    const response = await sendEmailJS({
                        name: topFormData.name,
                        company: topFormData.company,
                        email: topFormData.email,
                        phone: topFormData.phone
                    });
                    if (response.ok) {
                        setTopFormStatus('Dziękujemy! Skontaktujemy się z Tobą najszybciej jak to możliwe w celu rezerwacji ze zniżką.');
                        setTopFormData({ name: '', company: '', email: '', phone: '', consent: false });
                    } else { setTopFormStatus('Wystąpił problem z serwerem poczty. Spróbuj ponownie później.'); }
                } catch (error) { setTopFormStatus('Wystąpił błąd. Sprawdź połączenie z internetem.'); }
                setTopIsSubmitting(false);
            };

            const closeMenu = () => setMobileMenuOpen(false);

            return (
                <div className="min-h-screen relative w-full overflow-hidden">
                    
                    {/* NAWIGACJA */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'py-3 md:py-4 bg-white/95 backdrop-blur-xl border-b border-black/10 shadow-sm' : 'py-4 md:py-8 bg-transparent'}`}>
                        <div className="w-full px-4 md:px-12 flex justify-between items-center max-w-[1800px] mx-auto relative">
                            
                            {/* Lewe menu (ukryte na małych ekranach) */}
                            <div className="hidden lg:flex gap-12 text-xs font-black uppercase tracking-[0.2em] text-zinc-500 items-center">
                                <a href="#o-wydarzeniu" className="hover:text-black hover:-translate-y-1 transition-all">O Wydarzeniu</a>
                                <a href="#dla-kogo" className="hover:text-black hover:-translate-y-1 transition-all">Dla Kogo</a>
                                <a href="#informacje" className="hover:text-black hover:-translate-y-1 transition-all">Data & Miejsce</a>
                            </div>

                            {/* Hamburger Menu Mobile */}
                            <div className="lg:hidden flex-1">
                                <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 -ml-2 text-black z-50 relative">
                                    <Icon name={mobileMenuOpen ? "x" : "menu"} size={28} />
                                </button>
                            </div>

                            {/* Logo i nazwa po prawej stronie */}
                            <div className="flex items-center gap-3 md:gap-4 ml-auto z-50 relative">
                                <span className="font-grotesk font-black text-sm sm:text-lg md:text-2xl tracking-tighter uppercase text-right leading-none">Baltic Expo<br/>Estate</span>
                                <a href="#" className={`transition-all duration-500 transform hover:scale-105 origin-right flex-shrink-0 ${scrolled ? 'h-8 md:h-12' : 'h-10 md:h-16'}`}>
                                    <img src="https://i.imgur.com/qQ1EVoE.png" alt="Baltic Expo Estate Logo" className="h-full w-auto object-contain filter invert drop-shadow-xl" />
                                </a>
                            </div>
                            
                        </div>
                    </nav>

                    {/* OVERLAY MENU MOBILNEGO */}
                    <div className={`fixed inset-0 bg-white z-40 transition-transform duration-500 flex flex-col justify-center items-center ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:hidden`}>
                        <div className="flex flex-col gap-8 text-2xl font-black uppercase tracking-widest text-center">
                            <a href="#o-wydarzeniu" onClick={closeMenu} className="hover:text-zinc-500">O Wydarzeniu</a>
                            <a href="#dla-kogo" onClick={closeMenu} className="hover:text-zinc-500">Dla Kogo</a>
                            <a href="#informacje" onClick={closeMenu} className="hover:text-zinc-500">Data & Miejsce</a>
                            <a href="#rejestracja" onClick={closeMenu} className="mt-8 bg-black text-white py-4 px-8 text-sm">Zostań Wystawcą</a>
                        </div>
                    </div>

                    {/* HERO SECTION */}
                    <section className="relative min-h-screen pt-[120px] md:pt-[160px] lg:pt-[200px] pb-12 md:pb-20 flex flex-col justify-center border-b border-black overflow-hidden bg-white">
                        <div className="absolute inset-0 bg-architect-grid opacity-60"></div>
                        
                        <div ref={heroTextRef} className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full text-center pointer-events-none select-none z-0 transition-transform duration-100 ease-out">
                            <h1 className="text-[30vw] md:text-[25vw] font-black font-grotesk text-zinc-100/80 leading-none mt-10 md:mt-20">2026</h1>
                        </div>

                        <div className="relative z-10 w-full px-4 md:px-12 max-w-[1800px] mx-auto grid lg:grid-cols-12 gap-12 lg:gap-8 items-center reveal reveal-up">
                            
                            <div className="lg:col-span-7 pt-10 lg:pt-0">
                                <div className="flex items-center gap-3 md:gap-4 mb-6 md:mb-8">
                                    <div className="w-8 md:w-12 h-[2px] bg-black"></div>
                                    <p className="text-[10px] md:text-sm font-black uppercase tracking-[0.2em] md:tracking-[0.4em]">24.05.2026 r. • 11:00 - 18:00</p>
                                </div>
                                
                                <h1 className="text-4xl sm:text-5xl md:text-7xl lg:text-[6.5rem] font-grotesk font-black tracking-tighter leading-[0.95] md:leading-[0.9] uppercase mb-6 md:mb-8 mix-blend-difference text-black break-words">
                                    Bałtyckie Targi <br />
                                    <span className="text-outline">Nieruchomości</span> <br />
                                    <span className="text-2xl sm:text-3xl md:text-5xl lg:text-[4rem]">EDYCJA I</span>
                                </h1>

                                <div className="text-lg sm:text-xl md:text-3xl font-medium border-l-4 border-black pl-4 md:pl-6 py-2 bg-white/70 backdrop-blur-sm inline-block max-w-full">
                                    <p>Hala Gryfia Słupsk 2026 <br className="md:hidden"/>– największe wydarzenie w regionie.</p>
                                </div>
                            </div>

                            <div className="lg:col-span-5 flex justify-center lg:justify-end">
                                <div className="w-full max-w-md bg-white border-2 border-black p-5 md:p-8 shadow-[6px_6px_0px_0px_rgba(5,5,5,1)] md:shadow-[10px_10px_0px_0px_rgba(5,5,5,1)] relative overflow-hidden">
                                    <h2 className="text-xl md:text-2xl font-grotesk font-black mb-2 uppercase leading-tight">Zarezerwuj przestrzeń i zyskaj zabudowę za 0 zł</h2>
                                    <p className="text-xs md:text-sm text-zinc-500 mb-6 font-medium">Zostaw dane, a my skontaktujemy się z Tobą z ofertą specjalną.</p>
                                    
                                    {topFormStatus ? (
                                        <div className="bg-green-50 text-green-800 p-4 border border-green-200 font-bold text-xs md:text-sm relative z-10">
                                            {topFormStatus}
                                        </div>
                                    ) : (
                                        <form onSubmit={handleTopSubmit} className="space-y-3 relative z-10">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                                                <div className="input-group mb-0">
                                                    <input type="text" id="topName" required value={topFormData.name} onChange={(e) => setTopFormData({...topFormData, name: e.target.value})} placeholder=" " className="input-premium py-2 text-sm" />
                                                    <label htmlFor="topName" className="input-label">Imię</label>
                                                </div>
                                                <div className="input-group mb-0">
                                                    <input type="text" id="topCompany" required value={topFormData.company} onChange={(e) => setTopFormData({...topFormData, company: e.target.value})} placeholder=" " className="input-premium py-2 text-sm" />
                                                    <label htmlFor="topCompany" className="input-label">Nazwa firmy</label>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                                                <div className="input-group mb-0">
                                                    <input type="email" id="topEmail" required value={topFormData.email} onChange={(e) => setTopFormData({...topFormData, email: e.target.value})} placeholder=" " className="input-premium py-2 text-sm" />
                                                    <label htmlFor="topEmail" className="input-label">E-mail</label>
