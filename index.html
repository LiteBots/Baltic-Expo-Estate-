<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bałtyckie Targi Nieruchomości EDYCJA I | Słupsk 2026</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#050505',
                        white: '#ffffff',
                        zinc: {
                            900: '#18181b',
                            800: '#27272a',
                            100: '#f4f4f5',
                        }
                    },
                    animation: {
                        'marquee': 'marquee 25s linear infinite',
                        'marquee-fast': 'marquee 15s linear infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'scanline': 'scanline 4s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        },
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(500px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #ffffff;
            color: #050505;
            overflow-x: hidden;
        }

        ::selection {
            background-color: #050505;
            color: #ffffff;
        }

        .font-grotesk { font-family: 'Space Grotesk', sans-serif; }

        /* Noise Texture */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Outline Text */
        .text-outline {
            color: transparent;
            -webkit-text-stroke: 2px #050505;
        }
        .text-outline-white {
            color: transparent;
            -webkit-text-stroke: 2px rgba(255,255,255,0.15);
        }

        /* Scroll Reveal Animations */
        .reveal { opacity: 0; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform, opacity; }
        .reveal.active { opacity: 1; transform: translate(0, 0) scale(1); }
        
        .reveal-up { transform: translateY(60px); }
        .reveal-left { transform: translateX(-60px); }
        .reveal-right { transform: translateX(60px); }
        .reveal-scale { transform: scale(0.95); }

        /* Architect Grid */
        .bg-architect-grid {
            background-size: 60px 60px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px);
        }

        /* Floating Label Inputs */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            width: 100%;
        }
        .input-premium {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #e4e4e7;
            padding: 1.25rem 0 0.5rem 0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
            border-radius: 0;
        }
        .input-premium:focus {
            border-bottom-color: #050505;
        }
        .input-label {
            position: absolute;
            left: 0;
            top: 1.25rem;
            color: #a1a1aa;
            font-weight: 400;
            font-size: 0.95rem;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .input-premium:focus ~ .input-label,
        .input-premium:not(:placeholder-shown) ~ .input-label {
            transform: translateY(-1.25rem);
            font-size: 0.7rem;
            font-weight: 700;
            color: #050505;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .input-premium::placeholder { color: transparent; }
    </style>
</head>
<body class="antialiased">
    <div class="noise-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AUDIENCE = [
            { id: 1, title: "Deweloperzy", icon: "building-2", desc: "Prezentacja nowych inwestycji i osiedli." },
            { id: 2, title: "Agencje Nieruchomości", icon: "home", desc: "Rynek wtórny i pierwotny w jednym miejscu." },
            { id: 3, title: "Pośrednicy Kredytowi", icon: "calculator", desc: "Doradztwo finansowe i kredyty hipoteczne." },
            { id: 4, title: "Banki", icon: "landmark", desc: "Bezpośrednie oferty finansowania." },
            { id: 5, title: "Firmy Budowlane", icon: "hard-hat", desc: "Generalni wykonawcy i podwykonawcy." },
            { id: 6, title: "Wykończenia", icon: "paint-roller", desc: "Remonty i wykończenia pod klucz." },
            { id: 7, title: "Wnętrza & Design", icon: "sofa", desc: "Meble, oświetlenie i artykuły dekoracyjne." },
            { id: 8, title: "Notariusze", icon: "pen-tool", desc: "Obsługa prawna transakcji." },
            { id: 9, title: "Projektanci", icon: "ruler", desc: "Architekci i projektanci wnętrz." },
            { id: 10, title: "Domy Modułowe", icon: "box", desc: "Nowoczesne technologie budownictwa." }
        ];

        const TICKER_WORDS = ["INWESTYCJE", "NETWORKING", "ROZWÓJ", "BIZNES", "NIERUCHOMOŚCI", "KREDYTY", "BUDOWNICTWO", "DESIGN"];

        // EmailJS Configuration - Zaktualizowane dla konta Gmail
        const EMAILJS_SERVICE_ID = 'service_lvd7cze';
        const EMAILJS_TEMPLATE_ID = 'template_2lqka67';
        const EMAILJS_PUBLIC_KEY = 'ELubHWJeM4leHqOXv';

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Ticker = ({ direction = 'left', className = "", dark = false }) => (
            <div className={`flex overflow-hidden whitespace-nowrap py-5 border-y ${dark ? 'bg-black border-zinc-800 text-white' : 'bg-white border-zinc-200 text-black'} ${className}`}>
                <div className={`flex ${direction === 'left' ? 'animate-marquee' : 'animate-marquee-fast'} items-center`}>
                    {[...TICKER_WORDS, ...TICKER_WORDS, ...TICKER_WORDS, ...TICKER_WORDS].map((word, i) => (
                        <div key={i} className="flex items-center">
                            <span className="text-4xl md:text-6xl font-grotesk font-black uppercase mx-8">{word}</span>
                            <span className="text-xl opacity-30">✦</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        function App() {
            const [scrolled, setScrolled] = useState(false);
            
            // Bottom form state
            const [formData, setFormData] = useState({ nip: '', companyName: '', name: '', phone: '', email: '' });
            const [formStatus, setFormStatus] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            // Top form state
            const [topFormData, setTopFormData] = useState({ name: '', company: '', email: '', phone: '', consent: false });
            const [topFormStatus, setTopFormStatus] = useState(null);
            const [topIsSubmitting, setTopIsSubmitting] = useState(false);
            
            const heroTextRef = useRef(null);

            useEffect(() => {
                const observerOptions = { root: null, rootMargin: '0px', threshold: 0.15 };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    });
                }, observerOptions);

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                    if (heroTextRef.current) {
                        const scrollY = window.scrollY;
                        heroTextRef.current.style.transform = `translate(-50%, calc(-50% + ${scrollY * 0.4}px))`;
                    }
                };
                
                window.addEventListener('scroll', handleScroll);
                handleScroll(); 
                
                if (window.lucide) window.lucide.createIcons();
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    observer.disconnect();
                };
            }, []);

            // Funkcja wysyłająca dane do EmailJS
            const sendEmailJS = async (templateParams) => {
                return fetch('https://api.emailjs.com/api/v1.0/email/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        service_id: EMAILJS_SERVICE_ID,
                        template_id: EMAILJS_TEMPLATE_ID,
                        user_id: EMAILJS_PUBLIC_KEY,
                        template_params: templateParams
                    })
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                try {
                    const response = await sendEmailJS({
                        name: formData.name,
                        company: formData.companyName + (formData.nip ? ` (NIP: ${formData.nip})` : ''),
                        email: formData.email,
                        phone: formData.phone
                    });

                    if (response.ok) {
                        setFormStatus('Sukces! Komplet dokumentów wystawcy został wysłany na Twój adres e-mail.');
                        setFormData({ nip: '', companyName: '', name: '', phone: '', email: '' }); // czyszczenie formularza
                    } else {
                        setFormStatus('Wystąpił problem z serwerem poczty. Spróbuj ponownie później.');
                    }
                } catch (error) {
                    setFormStatus('Wystąpił błąd podczas wysyłania. Sprawdź połączenie z internetem.');
                }
                setIsSubmitting(false);
            };

            const handleTopSubmit = async (e) => {
                e.preventDefault();
                setTopIsSubmitting(true);
                
                try {
                    const response = await sendEmailJS({
                        name: topFormData.name,
                        company: topFormData.company,
                        email: topFormData.email,
                        phone: topFormData.phone
                    });

                    if (response.ok) {
                        setTopFormStatus('Dziękujemy! Skontaktujemy się z Tobą najszybciej jak to możliwe w celu rezerwacji ze zniżką.');
                        setTopFormData({ name: '', company: '', email: '', phone: '', consent: false }); // czyszczenie
                    } else {
                        setTopFormStatus('Wystąpił problem z serwerem poczty. Spróbuj ponownie później.');
                    }
                } catch (error) {
                    setTopFormStatus('Wystąpił błąd podczas wysyłania. Sprawdź połączenie z internetem.');
                }
                setTopIsSubmitting(false);
            };

            return (
                <div className="min-h-screen relative">
                    
                    {/* NAWIGACJA */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'py-4 bg-white/90 backdrop-blur-xl border-b border-black/10 shadow-sm' : 'py-6 md:py-8 bg-transparent'}`}>
                        <div className="w-full px-6 md:px-12 flex justify-between items-center max-w-[1800px] mx-auto">
                            
                            {/* Lewe menu (ukryte na małych ekranach) */}
                            <div className="hidden lg:flex gap-12 text-xs font-black uppercase tracking-[0.2em] text-zinc-500 items-center">
                                <a href="#o-wydarzeniu" className="hover:text-black hover:-translate-y-1 transition-all">O Wydarzeniu</a>
                                <a href="#dla-kogo" className="hover:text-black hover:-translate-y-1 transition-all">Dla Kogo</a>
                                <a href="#informacje" className="hover:text-black hover:-translate-y-1 transition-all">Data & Miejsce</a>
                            </div>
                            
                            {/* Menu mobilne (wypełniacz z lewej by wyśrodkować logo, na mobile flex-1 ułatwia pozycjonowanie) */}
                            <div className="lg:hidden flex-1"></div>

                            {/* Logo i nazwa po prawej stronie */}
                            <div className="flex items-center gap-4 ml-auto">
                                <span className="font-grotesk font-black text-lg md:text-2xl tracking-tighter uppercase text-right leading-none">Baltic Expo<br/>Estate</span>
                                <a href="#" className={`transition-all duration-500 transform hover:scale-105 origin-right flex-shrink-0 ${scrolled ? 'h-10 md:h-12' : 'h-14 md:h-16'}`}>
                                    <img src="https://i.imgur.com/qQ1EVoE.png" alt="Baltic Expo Estate Logo" className="h-full w-auto object-contain filter invert drop-shadow-xl" />
                                </a>
                            </div>
                            
                        </div>
                    </nav>

                    {/* HERO SECTION WITH TOP FORM */}
                    <section className="relative min-h-screen pt-[160px] lg:pt-[200px] pb-20 flex flex-col justify-center border-b border-black overflow-hidden bg-white">
                        <div className="absolute inset-0 bg-architect-grid opacity-60"></div>
                        
                        <div ref={heroTextRef} className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full text-center pointer-events-none select-none z-0 transition-transform duration-100 ease-out">
                            <h1 className="text-[25vw] font-black font-grotesk text-zinc-100 leading-none mt-10">2026</h1>
                        </div>

                        <div className="relative z-10 w-full px-6 md:px-12 max-w-[1800px] mx-auto grid lg:grid-cols-12 gap-12 items-center reveal reveal-up">
                            
                            {/* Lewa strona - Tytuł (zajmuje 7 z 12 kolumn) */}
                            <div className="lg:col-span-7">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="w-12 h-[2px] bg-black"></div>
                                    <p className="text-sm font-black uppercase tracking-[0.3em] md:tracking-[0.4em]">24.05.2026 rok, godzina 11:00 - 18:00</p>
                                </div>
                                
                                <h1 className="text-5xl md:text-7xl lg:text-[6.5rem] font-grotesk font-black tracking-tighter leading-[0.9] uppercase mb-8 mix-blend-difference text-black">
                                    Bałtyckie Targi <br />
                                    <span className="text-outline">Nieruchomości</span> <br />
                                    <span className="text-3xl md:text-5xl lg:text-[4rem]">EDYCJA I</span>
                                </h1>

                                <div className="text-xl md:text-3xl font-medium border-l-4 border-black pl-6 py-2 bg-white/50 backdrop-blur-sm inline-block">
                                    <p>Hala Gryfia Słupsk 2026 – największe wydarzenie w regionie.</p>
                                </div>
                            </div>

                            {/* Prawa strona - Top Formularz (zajmuje 5 z 12 kolumn, dosunięty do prawej) */}
                            <div className="lg:col-span-5 flex justify-end">
                                <div className="w-full max-w-md bg-white border-2 border-black p-6 md:p-8 shadow-[10px_10px_0px_0px_rgba(5,5,5,1)] relative overflow-hidden">
                                    <h2 className="text-2xl font-grotesk font-black mb-2 uppercase leading-tight">Zarezerwuj przestrzeń i zyskaj zabudowę za 0 zł</h2>
                                    <p className="text-sm text-zinc-500 mb-6 font-medium">Zostaw dane, a my skontaktujemy się z Tobą z ofertą specjalną.</p>
                                    
                                    {topFormStatus ? (
                                        <div className="bg-green-50 text-green-800 p-6 border border-green-200 font-bold text-sm relative z-10">
                                            {topFormStatus}
                                        </div>
                                    ) : (
                                        <form onSubmit={handleTopSubmit} className="space-y-3 relative z-10">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="input-group mb-0">
                                                    <input type="text" id="topName" required value={topFormData.name} onChange={(e) => setTopFormData({...topFormData, name: e.target.value})} placeholder=" " className="input-premium py-2" />
                                                    <label htmlFor="topName" className="input-label">Imię</label>
                                                </div>
                                                <div className="input-group mb-0">
                                                    <input type="text" id="topCompany" required value={topFormData.company} onChange={(e) => setTopFormData({...topFormData, company: e.target.value})} placeholder=" " className="input-premium py-2" />
                                                    <label htmlFor="topCompany" className="input-label">Nazwa firmy</label>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="input-group mb-0">
                                                    <input type="email" id="topEmail" required value={topFormData.email} onChange={(e) => setTopFormData({...topFormData, email: e.target.value})} placeholder=" " className="input-premium py-2" />
                                                    <label htmlFor="topEmail" className="input-label">Adres mailowy</label>
                                                </div>
                                                <div className="input-group mb-0">
                                                    <input type="tel" id="topPhone" required value={topFormData.phone} onChange={(e) => setTopFormData({...topFormData, phone: e.target.value})} placeholder=" " className="input-premium py-2" />
                                                    <label htmlFor="topPhone" className="input-label">Numer telefonu</label>
                                                </div>
                                            </div>

                                            <label className="flex items-start gap-3 mt-4 cursor-pointer group">
                                                <div className="relative flex items-center justify-center mt-0.5">
                                                    <input type="checkbox" required checked={topFormData.consent} onChange={(e) => setTopFormData({...topFormData, consent: e.target.checked})} className="peer appearance-none w-4 h-4 border-2 border-black rounded-sm checked:bg-black transition-colors" />
                                                    <Icon name="check" size={12} className="text-white absolute opacity-0 peer-checked:opacity-100 pointer-events-none" />
                                                </div>
                                                <span className="text-xs text-zinc-500 font-medium group-hover:text-black transition-colors leading-relaxed">
                                                    Wyrażam zgodę na otrzymywanie informacji handlowych drogą elektroniczną oraz kontakt w celu przedstawienia oferty.
                                                </span>
                                            </label>

                                            <button type="submit" disabled={topIsSubmitting} className="w-full bg-black text-white py-3.5 text-xs font-black uppercase tracking-[0.2em] hover:bg-zinc-800 transition-all mt-6 disabled:bg-zinc-400 disabled:cursor-not-allowed">
                                                {topIsSubmitting ? 'Wysyłanie...' : 'Zarezerwuj'}
                                            </button>
                                        </form>
                                    )}
                                </div>
                            </div>

                        </div>
                    </section>

                    <Ticker className="-mt-[1px]" />

                    {/* NOWA SEKCJA WPROWADZAJĄCA */}
                    <section id="o-wydarzeniu" className="py-24 px-6 md:px-12 max-w-[1800px] mx-auto border-b border-zinc-200">
                        <div className="grid lg:grid-cols-2 gap-16 reveal reveal-up items-center">
                            <div>
                                <h2 className="text-4xl md:text-5xl font-grotesk font-black mb-8 leading-tight">Największe wydarzenie nieruchomościowe w regionie Pomorza Środkowego.</h2>
                                <p className="text-xl text-zinc-600 mb-6 leading-relaxed">Już 24 maja 2026 roku Hala Gryfia w Słupsku stanie się centrum rynku nieruchomości, inwestycji i nowoczesnego budownictwa. Tworzymy wydarzenie, które połączy kluczowych przedstawicieli branży i przyciągnie setki osób aktywnie poszukujących nieruchomości oraz sprawdzonych partnerów biznesowych.</p>
                                <p className="text-xl text-zinc-600 leading-relaxed font-bold">To będzie największe wydarzenie nieruchomościowe w regionie Pomorza Środkowego – przestrzeń spotkań, inspiracji i realnych możliwości rozwoju biznesu.</p>
                            </div>
                            <div className="space-y-12">
                                <div className="border-l-4 border-black pl-6">
                                    <h3 className="text-2xl font-black font-grotesk mb-3">Twórz przyszłość rynku. Pokaż trendy i rozwiązania</h3>
                                    <p className="text-zinc-600">Inspirując się największymi wydarzeniami branżowymi, stawiamy na połączenie sprzedaży, wiedzy i trendów. Targi będą miejscem prezentacji nowoczesnych inwestycji, innowacyjnych rozwiązań oraz aktualnych kierunków rozwoju rynku nieruchomości i budownictwa.</p>
                                </div>
                                <div className="border-l-4 border-black pl-6">
                                    <h3 className="text-2xl font-black font-grotesk mb-3">Networking, który przekłada się na sprzedaż</h3>
                                    <p className="text-zinc-600">Targi to przestrzeń spotkań branży, miejsce, gdzie nawiązuje się relacje, które realnie przekładają się na rozwój biznesu. Spotkasz tu inwestorów, klientów indywidualnych oraz partnerów do współpracy.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* DLACZEGO WARTO / PRELEKCJE */}
                    <section className="py-24 bg-zinc-50 px-6 md:px-12 border-b border-zinc-200">
                        <div className="max-w-[1800px] mx-auto grid md:grid-cols-2 gap-16 reveal reveal-up">
                            <div className="bg-white p-10 border border-zinc-200 shadow-sm">
                                <h2 className="text-3xl font-grotesk font-black mb-6">Pokaż swoją ofertę tam, gdzie są Twoi klienci</h2>
                                <p className="text-lg mb-6 font-medium text-zinc-500">Targi to idealne miejsce, aby:</p>
                                <ul className="space-y-4 text-lg">
                                    <li className="flex gap-4"><Icon name="check-circle" className="text-black shrink-0" /> zaprezentować inwestycje i usługi szerokiemu gronu odbiorców,</li>
                                    <li className="flex gap-4"><Icon name="check-circle" className="text-black shrink-0" /> wyróżnić się na tle konkurencji,</li>
                                    <li className="flex gap-4"><Icon name="check-circle" className="text-black shrink-0" /> budować rozpoznawalność marki,</li>
                                    <li className="flex gap-4"><Icon name="check-circle" className="text-black shrink-0" /> pozyskać klientów gotowych do podjęcia decyzji.</li>
                                </ul>
                            </div>
                            <div className="bg-black text-white p-10 shadow-xl">
                                <h2 className="text-3xl font-grotesk font-black mb-6">Prelekcje, wiedza i eksperci</h2>
                                <p className="text-lg mb-6 font-medium text-zinc-400">Integralną częścią wydarzenia będą prelekcje i panele eksperckie. To doskonała okazja, aby:</p>
                                <ul className="space-y-4 text-lg">
                                    <li className="flex gap-4"><Icon name="arrow-right" className="text-white shrink-0" /> budować pozycję eksperta,</li>
                                    <li className="flex gap-4"><Icon name="arrow-right" className="text-white shrink-0" /> dzielić się wiedzą,</li>

                                    <p className="text-lg text-zinc-600 mb-6">Oferujemy stoiska o powierzchni od 4 m² do 20 m² – dopasowane zarówno do mniejszych firm, jak i dużych podmiotów.</p>
                                    
                                    <div className="bg-zinc-100 p-6 border-l-4 border-black">

                                            <div key={i} className="border border-blue-400/30 bg-blue-500/5 hover:bg-blue-400/40 transition-colors duration-300 flex flex-col items-center justify-center cursor-crosshair group/item relative backdrop-blur-sm">
                                                <span className="text-blue-300 font-bold text-lg mb-1 group-hover/item:text-white group-hover/item:scale-110 transition-all">S-{i+1}</span>
                                                <span className="text-[10px] text-blue-400 opacity-0 group-hover/item:opacity-100 transition-opacity">12 m²</span>

                                                <div className="absolute bottom-1 left-1 w-2 h-2 border-b border-l border-blue-400/50 group-hover/item:border-white transition-colors"></div>
                                                <div className="absolute bottom-1 right-1 w-2 h-2 border-b border-r border-blue-400/50 group-hover/item:border-white transition-colors"></div>
                                            </div>

                                        <span>Wejście B</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-black text-white pt-32 pb-12 px-6 md:px-12 border-t border-zinc-900">
                        <div className="max-w-[1800px] mx-auto">
                            <div className="grid lg:grid-cols-2 gap-20 mb-32">

                                        <div className="w-16 h-16 rounded-full border border-zinc-800 flex items-center justify-center group-hover:bg-white group-hover:border-white group-hover:text-black transition-all duration-300">
                                            <Icon name="mail" size={28} />
                                        </div>
                                        wystawcy@balticexpo.pl
                                    </a>
                                </div>
                            </div>

                            <div className="flex flex-col lg:flex-row justify-between items-center text-xs font-black uppercase tracking-[0.2em] text-zinc-500 pt-8 border-t border-zinc-900 gap-8">
                                <div>&copy; 2026 Bałtyckie Targi Nieruchomości. Wszystkie prawa zastrzeżone.</div>
                                <div className="flex flex-wrap justify-center gap-8">
                                    <a href="rule.html" className="hover:text-white transition-colors">Regulamin Targów</a>

                                    <a href="#" className="hover:text-white transition-colors">Dla Mediów</a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
